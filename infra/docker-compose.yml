# Stack de laboratorio — Grafana para empresas
# Uso: cd infra && docker compose up -d

services:
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana-lab
    depends_on:
      prometheus:
        condition: service_started
      postgres:
        condition: service_healthy
      loki:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      # M09-01: descomenta para provisioning de examples (no activo por defecto; puede coexistir con M03 manual)
      # - ./grafana/provisioning/examples:/etc/grafana/provisioning:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus-lab
    depends_on:
      node-exporter:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: node-exporter-lab
    # Sin montajes de host: métricas del contenedor (portable en Codespaces / Docker Desktop).
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9100/metrics | grep -q node_cpu_seconds_total"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: postgres-lab
    environment:
      POSTGRES_USER: grafana
      POSTGRES_PASSWORD: grafana
      POSTGRES_DB: lab
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafana -d lab"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  loki:
    image: grafana/loki:3.4.2
    container_name: loki-lab
    command: -config.file=/etc/loki/loki-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail-lab
    depends_on:
      loki:
        condition: service_started
      loggen:
        condition: service_started
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
      - lab-logs:/var/log/lab:ro
    restart: unless-stopped

  loggen:
    image: alpine:3.20
    container_name: loggen-lab
    command:
      - sh
      - -c
      - |
        mkdir -p /logs
        i=0
        while true; do
          i=$$((i + 1))
          m=$$((i % 10))
          if [ "$$m" -lt 7 ]; then LVL=INFO;  ST=200; EP=/api/health;
          elif [ "$$m" -lt 9 ]; then LVL=WARN;  ST=404; EP=/api/orders;
          else LVL=ERROR; ST=500; EP=/api/checkout; fi
          LAT=$$(( (i * 37) % 450 + 15 ))
          echo "$$(date -Iseconds) $$LVL demo-app request_id=$$i method=GET path=$$EP status=$$ST latency_ms=$$LAT" >> /logs/app.log
          sleep 2
        done
    volumes:
      - lab-logs:/logs
    restart: unless-stopped

volumes:
  grafana-data:
  prometheus-data:
  postgres-data:
  loki-data:
  lab-logs:
